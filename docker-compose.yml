version: '3.8'

services:
  backend:
    build: ./herramientas-node-api
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tienda
      - DB_USER=user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SYNC_ALTER=false
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend-app
    restart: unless-stopped
    labels:
      - "coolify.managed=true"
      - "coolify.port=80"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=tienda
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5438:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data_v2: